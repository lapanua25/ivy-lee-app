<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivy Lee Method - Weekly</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body data-theme="sakura">
    <div class="app-layout">
        <header class="app-header">
            <div class="header-content">
                <div class="header-titles">
                    <h1>Ivy Lee Method</h1>
                    <p>明日のための、最も重要な6つのタスクを1週間の視点で</p>
                </div>
                <div class="header-right-group">
                    <div class="controls-row">
                        <select id="theme-selector" class="theme-select" aria-label="テーマ選択">
                            <option value="light">Cloud White</option>
                            <option value="blue">Deep Ocean</option>
                            <option value="dark">Midnight Dark</option>
                            <option value="neon">Cyber Neon</option>
                            <option value="monochrome">Monochrome</option>
                        </select>
                        <button id="toggle-compact-btn" class="secondary-btn">俯瞰モード切替</button>
                        <button id="show-history-btn" class="secondary-btn">完了履歴</button>
                    </div>
                    <div class="category-toggle">
                        <button id="tab-work" class="tab-btn active" data-category="work">仕事</button>
                        <button id="tab-private" class="tab-btn" data-category="private">プライベート</button>
                    </div>
                </div>
            </div>
            <!-- Week Navigation -->
            <div class="week-navigation" style="justify-content: center; gap: 20px;">
                <button id="prev-week-btn" class="icon-btn border-btn" aria-label="前の週">◀ 先週</button>
                <button id="today-btn" class="icon-btn" style="font-size: 11px; padding: 4px 12px; background: rgba(0,0,0,0.05);">今日</button>
                <button id="next-week-btn" class="icon-btn border-btn" aria-label="次の週">来週 ▶</button>
            </div>
        </header>
        
        <main class="main-content">
            <div class="week-container" id="week-container">
                <!-- JS will inject 7 day cards here -->
            </div>
        </main>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>タスク完了履歴 <span id="history-category-label"></span></h2>
                <button id="close-modal-btn" class="close-btn" data-close="history-modal" aria-label="閉じる">×</button>
            </div>
            <div class="modal-body">
                <ul id="history-list" class="history-list">
                    <!-- History items will be injected here via JS -->
                </ul>
            </div>
            <div class="modal-footer">
                <button id="clear-history-btn" class="danger-btn">現在のカテゴリの履歴をすべてクリア</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('SW registered successfully');
                }).catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
