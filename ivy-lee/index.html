<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivy Lee Method - Weekly</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <link rel="apple-touch-icon" href="icon.svg">
    <!-- Firebase SDK (compat mode = グローバル firebase オブジェクト使用) -->
    <!-- v2.0 - Updated 2026-05-02 -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body data-theme="dark">
    <div class="app-layout">
        <header class="app-header">
            <div class="header-content">
                <div class="header-titles">
                    <h1>Ivy Lee Method</h1>
                    <p>明日のための、最も重要な6つのタスクを1週間の視点で</p>
                </div>
                <div class="header-right-group">
                    <div class="controls-row">
                        <select id="theme-selector" class="theme-select" aria-label="テーマ選択">
                            <option value="light">Cloud White</option>
                            <option value="dark">Midnight Dark</option>
                        </select>
                        <button id="show-routines-btn" class="secondary-btn">ルーティン設定</button>
                        <button id="show-history-btn" class="secondary-btn">完了履歴</button>
                    </div>
                    <div id="auth-container" class="auth-container">
                        <button id="google-login-btn" class="google-login-btn" style="display:none;">
                            <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                            </svg>
                            Google でログイン
                        </button>
                        <div id="user-info" class="user-info" style="display:none;">
                            <span class="sync-icon" title="クラウド同期中">☁️</span>
                            <span id="user-email" class="user-email"></span>
                            <button id="logout-btn" class="secondary-btn">ログアウト</button>
                        </div>
                    </div>
                    <div class="category-toggle">
                        <button id="tab-work" class="tab-btn active" data-category="work">仕事</button>
                        <button id="tab-private" class="tab-btn" data-category="private">プライベート</button>
                    </div>
                </div>
            </div>
            <!-- Week Navigation -->
            <div class="week-navigation" style="justify-content: center; gap: 20px;">
                <button id="prev-week-btn" class="icon-btn border-btn" aria-label="前の週">◀ 先週</button>
                <button id="today-btn" class="icon-btn" style="font-size: 11px; padding: 4px 12px; background: rgba(0,0,0,0.05);">今日</button>
                <button id="next-week-btn" class="icon-btn border-btn" aria-label="次の週">来週 ▶</button>
            </div>
        </header>
        
        <main class="main-content">
            <div class="week-container-wrapper" id="week-container-wrapper">
                <div class="week-container" id="week-container">
                    <!-- JS will inject day cards here -->
                </div>
            </div>
        </main>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>完了履歴 <span id="history-category-label"></span></h2>
                <button class="close-btn" data-close="history-modal" aria-label="閉じる">×</button>
            </div>
            <div class="modal-body">
                <ul id="history-list" class="history-list">
                    <!-- History entries injected here -->
                </ul>
            </div>
            <div class="modal-footer">
                <button id="clear-history-btn" class="danger-btn">現在の履歴を全消去</button>
            </div>
        </div>
    </div>

    <!-- Routine Modal -->
    <div id="routine-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>ルーティン設定 <span id="routine-category-label"></span></h2>
                <button class="close-btn" data-close="routine-modal" aria-label="閉じる">×</button>
            </div>
            <div class="modal-body">
                <div class="routine-input-group">
                    <input type="text" id="routine-text-input" placeholder="繰り返したいタスク名を入力...">
                    <div class="routine-rule-selectors" style="display:flex; gap:10px; margin-top:10px;">
                        <select id="routine-type" class="theme-select" style="flex:1;">
                            <option value="daily">毎日</option>
                            <option value="weekly">毎週</option>
                            <option value="monthly">毎月</option>
                            <option value="nth-weekday">第◯ ○曜日</option>
                        </select>
                        <select id="routine-value-weekly" class="theme-select hidden" style="flex:1;">
                            <option value="0">日曜日</option>
                            <option value="1">月曜日</option>
                            <option value="2">火曜日</option>
                            <option value="3">水曜日</option>
                            <option value="4">木曜日</option>
                            <option value="5">金曜日</option>
                            <option value="6">土曜日</option>
                        </select>
                        <select id="routine-value-monthly" class="theme-select hidden" style="flex:1;">
                            <!-- JS injected 1-31 -->
                        </select>
                        <div id="routine-value-nth" class="hidden" style="display:flex; gap:5px; flex:1;">
                            <select id="routine-nth-week" class="theme-select" style="flex:1;">
                                <option value="1">第1</option>
                                <option value="2">第2</option>
                                <option value="3">第3</option>
                                <option value="4">第4</option>
                                <option value="5">第5</option>
                            </select>
                            <select id="routine-nth-day" class="theme-select" style="flex:1;">
                                <option value="0">日曜日</option>
                                <option value="1">月曜日</option>
                                <option value="2">火曜日</option>
                                <option value="3">水曜日</option>
                                <option value="4">木曜日</option>
                                <option value="5">金曜日</option>
                                <option value="6">土曜日</option>
                            </select>
                        </div>
                    </div>
                    <button id="add-routine-btn" class="add-task-btn" style="width:100%; margin-top:15px; height:42px; font-size:14px;">このルールで登録</button>
                </div>
                <hr style="margin:25px 0; border:0; border-top:1px solid var(--border-color); opacity:0.3;">
                <h3 style="font-size:14px; margin-bottom:15px; color:var(--text-muted);">現在のルーティン一覧</h3>
                <ul id="routine-list" class="routine-list" style="list-style:none; padding:0; display:flex; flex-direction:column; gap:10px;">
                    <!-- Routine list cards injected here -->
                </ul>
                <hr style="margin:25px 0; border:0; border-top:1px solid var(--border-color); opacity:0.3;">
                <h3 style="font-size:14px; margin-bottom:15px; color:var(--text-muted);">📊 データ管理</h3>
                <div style="display:flex; gap:10px; flex-direction:column;">
                    <button id="export-data-btn" class="secondary-btn" style="width:100%; text-align:center;">📥 データをダウンロード</button>
                    <div style="display:flex; gap:8px;">
                        <input type="file" id="import-file-input" accept=".json" style="display:none;">
                        <button id="import-data-btn" class="secondary-btn" style="flex:1;">📤 データをアップロード</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('SW registered successfully');
                }).catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
